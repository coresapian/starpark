# LinkSpot - Docker Compose Configuration
# Satellite Tracking & Building Visualization Platform
# Version: 1.0.0

services:
  # PostgreSQL with PostGIS extension for spatial data
  postgres:
    image: postgis/postgis:15-3.3
    container_name: linkspot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-linkspot}
      POSTGRES_USER: ${POSTGRES_USER:-linkspot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5432:5432"
    networks:
      - linkspot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-linkspot} -d ${POSTGRES_DB:-linkspot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Redis cache for TLE data and building data
  redis:
    image: redis:7-alpine
    container_name: linkspot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - linkspot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # FastAPI Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: linkspot-backend
    restart: unless-stopped
    environment:
      # Database Configuration
      DATABASE_URL: ${DATABASE_URL:-postgresql://linkspot:changeme@postgres:5432/linkspot}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-linkspot}
      POSTGRES_USER: ${POSTGRES_USER:-linkspot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      
      # Redis Configuration
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      
      # Application Settings
      APP_ENV: ${APP_ENV:-development}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-false}
      
      # Cache TTL Settings (seconds)
      TLE_CACHE_TTL: ${TLE_CACHE_TTL:-14400}
      BUILDING_CACHE_TTL: ${BUILDING_CACHE_TTL:-86400}
      
      # Satellite Settings
      MIN_ELEVATION: ${MIN_ELEVATION:-25.0}
      SATELLITE_THRESHOLD: ${SATELLITE_THRESHOLD:-4}
      
      # CORS Settings
      CORS_ORIGINS: '${CORS_ORIGINS:-["*"]}'
      
      # API Keys (if needed for external services)
      N2YO_API_KEY: ${N2YO_API_KEY:-}
      CELESTRAK_API_URL: ${CELESTRAK_API_URL:-https://celestrak.org/NORAD/elements/}
    volumes:
      # Development: mount source code for hot reload
      - ./backend:/app:cached
      # Persistent storage for downloaded data
      - backend_data:/app/data
    ports:
      - "8000:8000"
    networks:
      - linkspot-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Nginx Frontend - Static File Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: linkspot-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - linkspot-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # Optional: Database backup service (runs on schedule)
  backup:
    image: postgres:15-alpine
    container_name: linkspot-backup
    restart: "no"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-linkspot}
      POSTGRES_USER: ${POSTGRES_USER:-linkspot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      BACKUP_DIR: /backups
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    networks:
      - linkspot-network
    depends_on:
      - postgres
    profiles:
      - backup
    entrypoint: ["/bin/sh", "/backup.sh"]

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_data:
    driver: local

# Custom network for service communication
networks:
  linkspot-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
